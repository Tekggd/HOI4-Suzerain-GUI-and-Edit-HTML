<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUZERAIN 剧情编辑器</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=Noto+Sans+SC:wght@300;400;500&family=Share+Tech+Mono&display=swap');
  :root {
    --bg:#0e0c09;--bg2:#161310;--bg3:#1e1a15;
    --border:#3a3020;--border-bright:#6b5a30;
    --gold:#c9a84c;--gold-dim:#7d6530;--gold-bright:#e8c96a;
    --red:#b84040;--red-bright:#e05050;
    --text:#d4c4a0;--text-dim:#7a6e58;--text-bright:#f0e0c0;
    --green:#4a8a50;--green-bright:#6ab870;
    --blue:#406080;--blue-bright:#60a0c0;
    --purple:#7060a0;--purple-bright:#a090d0;
    --panel-w:270px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
  header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;height:44px;display:flex;align-items:center;gap:12px;flex-shrink:0;position:relative;}
  header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);}
  .logo{font-family:'Noto Serif SC',serif;font-size:15px;color:var(--gold);font-weight:700;letter-spacing:2px;white-space:nowrap;}
  .logo span{color:var(--text-dim);font-weight:300;font-size:11px;margin-left:6px;}
  .header-actions{display:flex;gap:6px;margin-left:auto;}
  .btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:5px 12px;border-radius:2px;cursor:pointer;font-size:12px;font-family:'Noto Sans SC',sans-serif;transition:all .15s;white-space:nowrap;}
  .btn:hover{border-color:var(--gold-dim);color:var(--gold);}
  .btn.primary{background:var(--gold-dim);border-color:var(--gold);color:var(--bg);font-weight:500;}
  .btn.primary:hover{background:var(--gold);}
  .btn.danger{border-color:var(--red);color:var(--red-bright);}
  .btn.danger:hover{background:var(--red);color:#fff;}
  .btn.sm{padding:3px 8px;font-size:11px;}
  .input-inline{background:var(--bg);border:1px solid var(--border);color:var(--text-bright);padding:4px 8px;border-radius:2px;font-size:12px;font-family:'Noto Sans SC',sans-serif;outline:none;transition:border-color .15s;}
  .input-inline:focus{border-color:var(--gold-dim);}
  .main{display:flex;flex:1;overflow:hidden;}
  .left-panel{width:var(--panel-w);border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg2);flex-shrink:0;overflow:hidden;}
  .panel-section{border-bottom:1px solid var(--border);padding:10px;flex-shrink:0;}
  .section-title{font-size:10px;color:var(--gold-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;font-weight:600;}
  .char-list{display:flex;flex-direction:column;gap:3px;max-height:150px;overflow-y:auto;}
  .char-item{display:flex;align-items:center;gap:6px;padding:4px 6px;border-radius:2px;}
  .char-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .char-id-badge{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text-dim);margin-left:auto;}
  .story-list{display:flex;flex-direction:column;gap:2px;flex:1;overflow-y:auto;padding:6px;}
  .story-item{padding:6px 8px;border-radius:2px;cursor:pointer;border:1px solid transparent;transition:all .1s;font-size:12px;}
  .story-item:hover{background:var(--bg3);border-color:var(--border);}
  .story-item.active{background:var(--bg3);border-color:var(--gold-dim);color:var(--gold);}
  .canvas-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .canvas-toolbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:6px 12px;display:flex;align-items:center;gap:6px;flex-shrink:0;}
  .canvas-scroll{flex:1;overflow:auto;padding:20px;position:relative;}
  #nodeCanvas{position:relative;min-width:100%;min-height:100%;}
  svg#connections{position:absolute;top:0;left:0;pointer-events:none;overflow:visible;width:100%;height:100%;}
  .node{position:absolute;width:230px;border-radius:3px;border:1px solid var(--border);background:var(--bg3);cursor:default;user-select:none;transition:box-shadow .15s,border-color .15s;font-size:12px;}
  .node:hover{border-color:var(--border-bright);box-shadow:0 4px 16px rgba(0,0,0,.4);}
  .node.selected{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold-dim),0 4px 20px rgba(0,0,0,.5);}
  .node-header{padding:6px 8px;display:flex;align-items:center;gap:5px;cursor:grab;border-radius:3px 3px 0 0;background:rgba(0,0,0,.2);border-bottom:1px solid var(--border);}
  .node-header:active{cursor:grabbing;}
  .node-num{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--gold);min-width:22px;font-weight:700;}
  .node-tag{font-size:9px;padding:1px 5px;border-radius:10px;font-weight:600;letter-spacing:.5px;}
  .tag-D{background:rgba(100,80,30,.3);color:var(--gold);border:1px solid var(--gold-dim);}
  .tag-O{background:rgba(60,100,60,.3);color:var(--green-bright);border:1px solid var(--green);}
  .tag-E{background:rgba(120,40,40,.3);color:var(--red-bright);border:1px solid var(--red);}
  .tag-P{background:rgba(40,60,100,.3);color:var(--blue-bright);border:1px solid var(--blue);}
  .tag-T{background:rgba(90,60,120,.3);color:var(--purple-bright);border:1px solid var(--purple);}
  .node-body{padding:8px;cursor:pointer;}
  .node-speaker{font-size:11px;font-weight:600;margin-bottom:3px;font-family:'Noto Serif SC',serif;}
  .node-text{color:var(--text);line-height:1.5;font-size:12px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
  .node-sub{padding:3px 8px;border-top:1px solid var(--border);}
  .node-actions{display:flex;gap:3px;padding:4px 8px;border-top:1px solid var(--border);}
  .node-action{flex:1;background:none;border:1px solid var(--border);color:var(--text-dim);padding:2px;border-radius:2px;cursor:pointer;font-size:10px;transition:all .1s;text-align:center;}
  .node-action:hover{border-color:var(--gold-dim);color:var(--gold);}
  .node-action.del:hover{border-color:var(--red);color:var(--red-bright);}
  .add-node-btn{background:var(--bg3);border:1px dashed var(--border);color:var(--text-dim);padding:4px 10px;border-radius:2px;cursor:pointer;font-size:11px;font-family:'Noto Sans SC',sans-serif;transition:all .15s;}
  .add-node-btn:hover{border-color:var(--gold-dim);color:var(--gold);border-style:solid;}
  .right-panel{width:330px;border-left:1px solid var(--border);background:var(--bg2);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
  .inspector-header{padding:8px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;}
  .inspector-body{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:9px;}
  .field-group{display:flex;flex-direction:column;gap:4px;}
  .field-label{font-size:10px;color:var(--gold-dim);letter-spacing:1px;text-transform:uppercase;}
  textarea.fi,input.fi,select.fi{background:var(--bg);border:1px solid var(--border);color:var(--text-bright);padding:6px 8px;border-radius:2px;font-size:12px;font-family:'Noto Sans SC',sans-serif;outline:none;transition:border-color .15s;width:100%;resize:vertical;}
  textarea.fi:focus,input.fi:focus,select.fi:focus{border-color:var(--gold-dim);}
  select.fi option{background:var(--bg2);}
  .checkbox-row{display:flex;align-items:center;gap:6px;cursor:pointer;padding:2px 0;}
  .checkbox-row input{accent-color:var(--gold);}
  .hint{font-size:10px;color:var(--text-dim);line-height:1.5;}
  .mono{font-family:'Share Tech Mono',monospace;font-size:11px;}
  .divider{height:1px;background:var(--border);margin:2px 0;}
  .sub-panel{background:rgba(0,0,0,.15);border:1px solid var(--border);border-radius:3px;padding:8px;display:flex;flex-direction:column;gap:6px;}
  .sub-title{font-size:10px;letter-spacing:1px;text-transform:uppercase;font-weight:600;}
  .card{background:var(--bg);border:1px solid var(--border);border-radius:2px;padding:7px 8px;display:flex;flex-direction:column;gap:5px;}
  .card-row{display:flex;align-items:center;gap:5px;}
  .card-row input,.card-row select{background:var(--bg2);border:1px solid var(--border);color:var(--text-bright);padding:3px 6px;border-radius:2px;font-size:11px;outline:none;font-family:'Noto Sans SC',sans-serif;}
  .card-row input:focus,.card-row select:focus{border-color:var(--gold-dim);}
  .card-row textarea{background:var(--bg2);border:1px solid var(--border);color:var(--text-bright);padding:3px 6px;border-radius:2px;font-size:10px;outline:none;font-family:'Share Tech Mono',monospace;width:100%;resize:vertical;}
  .card-row textarea:focus{border-color:var(--gold-dim);}
  .xbtn{background:none;border:1px solid var(--border);color:var(--text-dim);width:19px;height:19px;border-radius:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;transition:all .1s;}
  .xbtn:hover{border-color:var(--red);color:var(--red-bright);}
  .opt-eff{font-family:'Share Tech Mono',monospace;font-size:10px;background:var(--bg2);border:1px solid var(--border);color:var(--text-bright);padding:4px 6px;border-radius:2px;outline:none;width:100%;resize:vertical;}
  .opt-eff:focus{border-color:var(--green);}
  .eff-label{font-size:9px;color:var(--green);letter-spacing:1px;}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:center;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--bg2);border:1px solid var(--border-bright);border-radius:4px;width:720px;max-width:95vw;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.6);}
  .modal-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;}
  .modal-body{flex:1;overflow-y:auto;padding:16px;}
  .modal-footer{padding:10px 16px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0;}
  pre.code-block{background:var(--bg);border:1px solid var(--border);border-radius:2px;padding:12px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text);overflow-x:auto;white-space:pre;line-height:1.6;max-height:60vh;overflow-y:auto;}
  .tab-bar{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
  .tab{padding:6px 12px;font-size:11px;cursor:pointer;border-bottom:2px solid transparent;color:var(--text-dim);transition:all .15s;}
  .tab.active{color:var(--gold);border-bottom-color:var(--gold);}
  .tab:hover:not(.active){color:var(--text);}
  .preview-chat{background:#1a1a2e;border:1px solid #2a2a4a;border-radius:4px;padding:12px;font-family:'Noto Serif SC',serif;}
  .preview-msg{margin-bottom:10px;padding:8px 10px;border-radius:3px;background:rgba(255,255,255,.03);border-left:2px solid var(--border-bright);}
  .preview-speaker{font-size:11px;font-weight:600;margin-bottom:3px;}
  .preview-content{font-size:12px;line-height:1.7;color:var(--text);}
  .preview-opt{background:rgba(100,150,80,.1);border:1px solid var(--green);color:var(--green-bright);padding:4px 8px;border-radius:2px;font-size:11px;margin-top:4px;}
  .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:350px;gap:12px;color:var(--text-dim);font-family:'Noto Serif SC',serif;}
  ::-webkit-scrollbar{width:4px;height:4px;}
  ::-webkit-scrollbar-track{background:var(--bg);}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
  ::-webkit-scrollbar-thumb:hover{background:var(--border-bright);}
</style>
</head>
<body>
<header>
  <div class="logo">SUZERAIN <span>剧情编辑器 v2</span></div>
  <div style="width:1px;height:20px;background:var(--border)"></div>
  <div style="display:flex;gap:6px;align-items:center;">
    <span style="font-size:11px;color:var(--text-dim)">剧情：</span>
    <select id="storySel" class="input-inline" style="width:160px"></select>
    <button class="btn sm" onclick="newStory()">＋ 新建</button>
    <button class="btn sm danger" onclick="deleteStory()">删除</button>
  </div>
  <div class="header-actions">
    <button class="btn sm" onclick="autoLayout()">自动排版</button>
    <button class="btn sm" onclick="showPreview()">预览</button>
    <button class="btn primary sm" onclick="showExport()">导出代码</button>
  </div>
</header>

<div class="main">
  <div class="left-panel">
    <div class="panel-section">
      <div class="section-title">角色管理</div>
      <div id="charList" class="char-list"></div>
      <div style="display:flex;gap:4px;margin-top:6px;">
        <input id="newCharName" class="input-inline" placeholder="角色名" style="flex:1;min-width:0">
        <button class="btn sm" onclick="addChar()">＋</button>
      </div>
      <div class="hint" style="margin-top:4px">ID从10000起自动分配</div>
    </div>
    <div style="padding:8px 10px 4px;font-size:10px;color:var(--gold-dim);letter-spacing:2px;text-transform:uppercase;flex-shrink:0;">剧情列表</div>
    <div id="storyList" class="story-list"></div>
  </div>

  <div class="canvas-area">
    <div class="canvas-toolbar">
      <button class="add-node-btn" onclick="addNode()">＋ 添加节点</button>
      <div style="margin-left:auto;font-size:10px;color:var(--text-dim)">拖动标题栏移动 · 点击节点体选中编辑</div>
    </div>
    <div class="canvas-scroll" id="canvasScroll">
      <div id="nodeCanvas">
        <svg id="connections"></svg>
        <div id="emptyState" class="empty-state">
          <div style="font-size:36px;opacity:.3">📜</div>
          <div>选择或新建剧情，然后添加节点</div>
        </div>
      </div>
    </div>
  </div>

  <div class="right-panel">
    <div class="inspector-header">
      <span style="font-size:11px;color:var(--gold-dim);letter-spacing:1px">属性编辑</span>
      <span id="nodeIdBadge" style="font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text-dim);margin-left:auto"></span>
    </div>
    <div class="inspector-body" id="inspBody">
      <div style="color:var(--text-dim);font-size:12px">请选择一个节点</div>
    </div>
  </div>
</div>

<!-- EXPORT -->
<div class="modal-overlay" id="exportModal">
  <div class="modal">
    <div class="modal-header">
      <span style="font-family:'Noto Serif SC',serif;color:var(--gold)">导出 HOI4 脚本</span>
      <button class="btn sm" style="margin-left:auto" onclick="closeModal('exportModal')">关闭</button>
    </div>
    <div class="modal-body">
      <div class="tab-bar" style="margin-bottom:12px">
        <div class="tab active" id="et1" onclick="switchET('eff')">Effects (.txt)</div>
        <div class="tab" id="et2" onclick="switchET('loc')">本地化 (.yml)</div>
      </div>
      <div id="effDiv"><pre class="code-block" id="effCode"></pre></div>
      <div id="locDiv" style="display:none"><pre class="code-block" id="locCode"></pre></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="copyExp()">复制</button>
      <button class="btn primary" onclick="dlExp()">下载</button>
    </div>
  </div>
</div>

<!-- PREVIEW -->
<div class="modal-overlay" id="previewModal">
  <div class="modal">
    <div class="modal-header">
      <span style="font-family:'Noto Serif SC',serif;color:var(--gold)">对话预览</span>
      <button class="btn sm" style="margin-left:auto" onclick="closeModal('previewModal')">关闭</button>
    </div>
    <div class="modal-body"><div id="prevContent" class="preview-chat"></div></div>
  </div>
</div>

<script>
// ================================================================
// DATA
// ================================================================
let S = {
  chars:[
    {id:10000,name:'邓演达',color:'#c9a84c'},
    {id:10001,name:'胡汉民',color:'#4a8a50'},
    {id:10002,name:'汪精卫',color:'#b84040'},
    {id:10003,name:'你（玩家）',color:'#406080'},
    {id:10004,name:'刘从云',color:'#8060a0'},
    {id:10005,name:'关羽',color:'#40a060'},
    {id:10006,name:'曹操',color:'#a06040'},
  ],
  stories:[], curS:null, curN:null, nextS:1, nextC:10007
};

// NODE:
// { id, msgNum, text, speaker(charId|''), nameOnFirst:bool,
//   portraitOps:[{type,charId,song}],  // type: remove_first_add|add_first_empty|move_last|clear
//   isEnd:bool,
//   isTransfer:bool,
//   transferBranches:[{condType,toMsgNum,...condFields}],  // condType: none|check_variable|has_country_flag|is_in_array|custom
//   options:[{optNum,text,toMsgNum,useContinue,effectScript}],
//   x,y }

function save(){try{localStorage.setItem('szr2',JSON.stringify(S));}catch(e){}}
function load(){try{const d=localStorage.getItem('szr2');if(d)Object.assign(S,JSON.parse(d));}catch(e){}}
function cs(){return S.stories.find(s=>s.id===S.curS)||null;}
function cn(){const st=cs();return st?st.nodes.find(n=>n.id===S.curN)||null:null;}
function cb(id){return S.chars.find(c=>c.id==id)||null;}
function cname(id){const c=cb(id);return c?c.name:`ID:${id}`;}
function ccolor(id){const c=cb(id);return c?c.color:'var(--text-dim)';}
const COLS=['#c9a84c','#4a8a50','#b84040','#406080','#8060a0','#40a060','#a06040','#6080a0'];
function charOpts(sel=''){
  return '<option value="">— 无 —</option>'+
    S.chars.map(c=>`<option value="${c.id}"${c.id==sel?' selected':''}>${c.name} (${c.id})</option>`).join('');
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ================================================================
// INIT
// ================================================================
function init(){
  load(); renderChars(); renderStories(); renderStorySel();
  if(S.stories.length) selectStory(S.stories[0].id);
}

// ================================================================
// CHARS
// ================================================================
function addChar(){
  const name=document.getElementById('newCharName').value.trim(); if(!name)return;
  S.chars.push({id:S.nextC++,name,color:COLS[S.chars.length%COLS.length]});
  document.getElementById('newCharName').value='';
  save(); renderChars(); if(S.curN)renderInspector();
}
function renderChars(){
  document.getElementById('charList').innerHTML=S.chars.map(c=>
    `<div class="char-item">
      <div class="char-dot" style="background:${c.color}"></div>
      <span style="font-size:12px">${c.name}</span>
      <span class="char-id-badge">${c.id}</span>
      <button class="xbtn" style="margin-left:4px;width:16px;height:16px;font-size:10px" onclick="delChar(${c.id})" title="删除角色">✕</button>
    </div>`
  ).join('');
}
function delChar(id){
  const c=S.chars.find(c=>c.id===id);
  if(!c)return;
  if(!confirm(`删除角色「${c.name}」？\n注意：已引用该角色的节点不会自动清空。`))return;
  S.chars=S.chars.filter(c=>c.id!==id);
  save();renderChars();if(S.curN)renderInspector();
}

// ================================================================
// STORIES
// ================================================================
function newStory(){
  const name=prompt('剧情名称：');if(!name)return;
  const key=prompt('token key（字母_数字，如 kmd_c1）：');if(!key)return;
  const s={id:S.nextS++,tokenKey:key.replace(/[^a-z0-9_]/gi,'_'),displayName:name,song:'',nodes:[],nextN:1};
  S.stories.push(s);save();renderStories();renderStorySel();selectStory(s.id);
}
function deleteStory(){
  const st=cs();if(!st)return;
  if(!confirm(`删除「${st.displayName}」？`))return;
  S.stories=S.stories.filter(s=>s.id!==S.curS);S.curS=null;S.curN=null;
  save();renderStories();renderStorySel();renderCanvas();renderInspector();
}
function selectStory(id){
  S.curS=id;S.curN=null;
  document.getElementById('storySel').value=id;
  renderStories();renderCanvas();renderInspector();
}
function renderStories(){
  const el=document.getElementById('storyList');
  if(!S.stories.length){el.innerHTML='<div style="color:var(--text-dim);font-size:11px;padding:8px">暂无剧情</div>';return;}
  el.innerHTML=S.stories.map(s=>`
    <div class="story-item${s.id===S.curS?' active':''}" onclick="selectStory(${s.id})">
      <div style="font-weight:500">${s.displayName}</div>
      <div style="font-size:10px;color:var(--text-dim);font-family:'Share Tech Mono',monospace">${s.tokenKey}</div>
      <div style="font-size:10px;color:var(--text-dim)">${s.nodes.length} 节点</div>
    </div>`).join('');
}
function renderStorySel(){
  const sel=document.getElementById('storySel');
  sel.innerHTML='<option value="">— 选择剧情 —</option>'+
    S.stories.map(s=>`<option value="${s.id}">${s.displayName} (${s.tokenKey})</option>`).join('');
  if(S.curS)sel.value=S.curS;
  sel.onchange=()=>{if(sel.value)selectStory(parseInt(sel.value));};
}

// ================================================================
// NODES
// ================================================================
function addNode(){
  const st=cs();if(!st){alert('请先选择剧情');return;}
  const used=st.nodes.map(n=>n.msgNum);
  let num=1;while(used.includes(num))num++;
  const node={id:st.nextN++,msgNum:num,text:'',speaker:'',nameOnFirst:false,
    portraitOps:[],isEnd:false,isTransfer:false,transferBranches:[],options:[],x:40+Math.random()*280,y:40+Math.random()*180};
  st.nodes.push(node);save();renderCanvas();selectNode(node.id);
}
function deleteNode(nid){
  const st=cs();if(!st)return;
  st.nodes=st.nodes.filter(n=>n.id!==nid);
  if(S.curN===nid){S.curN=null;renderInspector();}
  save();renderCanvas();
}
function selectNode(nid){
  S.curN=nid;
  document.querySelectorAll('.node').forEach(el=>el.classList.toggle('selected',el.dataset.nid==nid));
  renderInspector();
}

// ================================================================
// CANVAS
// ================================================================
function renderCanvas(){
  const st=cs();
  document.querySelectorAll('.node').forEach(e=>e.remove());
  const empty=document.getElementById('emptyState');
  empty.style.display=(!st||!st.nodes.length)?'flex':'none';
  if(!st||!st.nodes.length){document.getElementById('connections').innerHTML='';return;}
  let mx=800,my=600;
  st.nodes.forEach(n=>{mx=Math.max(mx,n.x+270);my=Math.max(my,n.y+210);});
  const canvas=document.getElementById('nodeCanvas');
  canvas.style.width=mx+'px';canvas.style.height=my+'px';
  st.nodes.forEach(renderNodeEl);drawSVG();
}
function renderNodeEl(node){
  const canvas=document.getElementById('nodeCanvas');
  let el=canvas.querySelector(`[data-nid="${node.id}"]`);
  const sp=node.speaker?cb(node.speaker):null;
  const sc=sp?sp.color:'var(--text-dim)';
  const tags=[];
  if(node.portraitOps.length)tags.push(`<span class="node-tag tag-P">P×${node.portraitOps.length}</span>`);
  if(node.isEnd)tags.push(`<span class="node-tag tag-E">END</span>`);
  if(node.isTransfer)tags.push(`<span class="node-tag tag-T">T×${node.transferBranches.length}</span>`);
  if(node.options.length)tags.push(`<span class="node-tag tag-O">OPT×${node.options.length}</span>`);
  if(!tags.length)tags.push(`<span class="node-tag tag-D">台词</span>`);
  let sub='';
  if(node.options.length)
    sub+=`<div class="node-sub">`+node.options.map(o=>`<div style="color:var(--green-bright);font-size:10px;padding:1px 0">▶ [${o.optNum||'?'}] ${esc((o.text||'...').slice(0,22))}</div>`).join('')+'</div>';
  if(node.isTransfer&&node.transferBranches.length)
    sub+=`<div class="node-sub">`+node.transferBranches.map(b=>`<div style="color:var(--purple-bright);font-size:10px;padding:1px 0">⤳ ${b.condType==='none'?'默认':'条件'} → #${b.toMsgNum||'?'}</div>`).join('')+'</div>';
  const html=`
    <div class="node-header" onmousedown="startDrag(event,${node.id})">
      <span class="node-num">#${node.msgNum}</span>
      ${sp?`<span style="color:${sc};font-size:11px;font-weight:600">${sp.name}</span>`:'<span style="color:var(--text-dim);font-size:10px">旁白</span>'}
      <div style="margin-left:auto;display:flex;gap:2px;flex-wrap:wrap;justify-content:flex-end">${tags.join('')}</div>
    </div>
    <div class="node-body" onclick="selectNode(${node.id})">
      ${sp?`<div class="node-speaker" style="color:${sc}">${sp.name}${node.nameOnFirst?' <span style="font-size:9px;color:var(--gold-dim)">[NAME]</span>':''}</div>`:''}
      <div class="node-text">${esc(node.text)||'<span style="color:var(--text-dim);font-style:italic">（空台词）</span>'}</div>
    </div>
    ${sub}
    <div class="node-actions">
      <button class="node-action" onclick="selectNode(${node.id})">编辑</button>
      <button class="node-action del" onclick="deleteNode(${node.id})">删除</button>
    </div>`;
  if(!el){el=document.createElement('div');el.className='node';el.dataset.nid=node.id;canvas.appendChild(el);}
  el.innerHTML=html;el.style.left=node.x+'px';el.style.top=node.y+'px';
  el.classList.toggle('selected',node.id===S.curN);
}

function drawSVG(){
  const st=cs();const svg=document.getElementById('connections');
  if(!st){svg.innerHTML='';return;}
  const nm={};st.nodes.forEach(n=>nm[n.msgNum]=n);
  let p='';const W=230;
  st.nodes.forEach(n=>{
    const x1=n.x+W,y1=n.y+26;
    if(!n.isEnd&&!n.isTransfer&&!n.options.length){
      const t=nm[n.msgNum+1];if(t){const x2=t.x,y2=t.y+26,mx=(x1+x2)/2;
        p+=`<path d="M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}" stroke="var(--gold-dim)" stroke-width="1.5" fill="none" opacity=".5" marker-end="url(#ar)"/>`;
      }
    }
    if(n.isTransfer)n.transferBranches.forEach((b,i)=>{
      const t=nm[parseInt(b.toMsgNum)];if(!t)return;
      const x2=t.x,y2=t.y+26,mx=(x1+x2)/2,y1b=y1+i*12;
      p+=`<path d="M${x1},${y1b} C${mx},${y1b} ${mx},${y2} ${x2},${y2}" stroke="var(--purple)" stroke-width="1.5" fill="none" opacity=".6" stroke-dasharray="${b.condType==='none'?'0':'4,3'}" marker-end="url(#arp)"/>`;
    });
    n.options.forEach((o,i)=>{
      const t=nm[parseInt(o.toMsgNum)];if(!t)return;
      const x2=t.x,y2=t.y+26,mx=(x1+x2)/2,y1b=y1+i*14;
      p+=`<path d="M${x1},${y1b} C${mx},${y1b} ${mx},${y2} ${x2},${y2}" stroke="var(--green)" stroke-width="1.5" fill="none" opacity=".6" marker-end="url(#arg)"/>`;
    });
  });
  svg.innerHTML=`<defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="var(--gold-dim)" opacity=".7"/></marker>
    <marker id="arg" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="var(--green)" opacity=".7"/></marker>
    <marker id="arp" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="var(--purple)" opacity=".7"/></marker>
  </defs>${p}`;
}

let drag=null;
function startDrag(e,nid){if(e.button!==0)return;e.preventDefault();selectNode(nid);
  const n=cs().nodes.find(n=>n.id===nid);drag={nid,ox:e.clientX-n.x,oy:e.clientY-n.y};
  document.addEventListener('mousemove',onDrag);document.addEventListener('mouseup',endDrag);}
function onDrag(e){if(!drag)return;const st=cs();if(!st)return;
  const n=st.nodes.find(n=>n.id===drag.nid);if(!n)return;
  n.x=Math.max(0,e.clientX-drag.ox);n.y=Math.max(0,e.clientY-drag.oy);
  const el=document.querySelector(`[data-nid="${drag.nid}"]`);
  if(el){el.style.left=n.x+'px';el.style.top=n.y+'px';}drawSVG();}
function endDrag(){if(drag){save();drag=null;}document.removeEventListener('mousemove',onDrag);document.removeEventListener('mouseup',endDrag);}

function autoLayout(){const st=cs();if(!st||!st.nodes.length)return;
  const s=[...st.nodes].sort((a,b)=>a.msgNum-b.msgNum);
  s.forEach((n,i)=>{n.x=40+(i%3)*265;n.y=40+Math.floor(i/3)*190;});
  save();renderCanvas();}

document.getElementById('canvasScroll').addEventListener('click',function(e){
  if(e.target===this||e.target.id==='nodeCanvas'||e.target.id==='connections'){
    S.curN=null;document.querySelectorAll('.node.selected').forEach(el=>el.classList.remove('selected'));renderInspector();
  }
});

}

// ================================================================
// PATCH
// ================================================================
function patch(f,v){const n=cn();if(!n)return;n[f]=v;save();renderNodeEl(n);drawSVG();
  if(f==='isTransfer')renderInspector();}

function addPop(){const n=cn();if(!n)return;n.portraitOps.push({type:'remove_first_add',charId:'',song:''});save();renderInspector();renderNodeEl(n);}
function delPop(i){const n=cn();if(!n)return;n.portraitOps.splice(i,1);save();renderInspector();renderNodeEl(n);}
function updPop(i,f,v){const n=cn();if(!n||!n.portraitOps[i])return;n.portraitOps[i][f]=v;save();renderNodeEl(n);}

function addTBr(){const n=cn();if(!n)return;n.transferBranches.push({condType:'none',toMsgNum:'',condScript:'',varName:'',varValue:'',flagName:'',arrayName:'',arrayValue:''});save();renderInspector();renderNodeEl(n);}
function delTBr(i){const n=cn();if(!n)return;n.transferBranches.splice(i,1);save();renderInspector();renderNodeEl(n);drawSVG();}
function updTBr(i,f,v){const n=cn();if(!n||!n.transferBranches[i])return;n.transferBranches[i][f]=v;save();renderNodeEl(n);drawSVG();}

function addOpt(){const n=cn();if(!n)return;n.options.push({optNum:n.options.length+1,text:'',toMsgNum:'',useContinue:false,effectScript:''});save();renderInspector();renderNodeEl(n);}
function delOpt(i){const n=cn();if(!n)return;n.options.splice(i,1);save();renderInspector();renderNodeEl(n);drawSVG();}
function updOpt(i,f,v){const n=cn();if(!n||!n.options[i])return;n.options[i][f]=v;save();renderNodeEl(n);drawSVG();}

// ================================================================
function showExport(){const st=cs();if(!st){alert('请先选择剧情');return;}genExport(st);switchET('eff');document.getElementById('exportModal').classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function switchET(t){
  document.getElementById('et1').classList.toggle('active',t==='eff');
  document.getElementById('et2').classList.toggle('active',t==='loc');
  document.getElementById('effDiv').style.display=t==='eff'?'':'none';
  document.getElementById('locDiv').style.display=t==='loc'?'':'none';
}

function limitBlock(b,ind){
  if(b.condType==='none')return null;
  if(b.condType==='check_variable')
    return `${ind}limit = { check_variable = { ${b.varName||'???'} = ${b.varValue||'???'} } }`;
  if(b.condType==='has_country_flag')
    return `${ind}limit = { has_country_flag = ${b.flagName||'???'} }`;
  if(b.condType==='is_in_array')
    return `${ind}limit = {\n${ind}\tis_in_array = {\n${ind}\t\tarray = ${b.arrayName||'???'}\n${ind}\t\tvalue = ${b.arrayValue||'???'}\n${ind}\t}\n${ind}}`;
  if(b.condType==='custom')
    return `${ind}limit = {\n`+(b.condScript||'').split('\n').map(l=>`${ind}\t${l.trim()}`).join('\n')+`\n${ind}}`;
  return null;
}

function genExport(st){
  const k=st.tokenKey;
  const nodes=[...st.nodes].sort((a,b)=>a.msgNum-b.msgNum);
  const pNodes=nodes.filter(n=>n.portraitOps.length>0);
  const eNodes=nodes.filter(n=>n.isEnd);
  const tNodes=nodes.filter(n=>n.isTransfer&&n.transferBranches.length>0);
  const oNodes=nodes.filter(n=>n.options.length>0);
  const nNodes=nodes.filter(n=>n.nameOnFirst&&n.speaker);
  const bySpeaker={};
  nNodes.forEach(n=>{if(!bySpeaker[n.speaker])bySpeaker[n.speaker]=[];bySpeaker[n.speaker].push(n.msgNum);});

  let e=`# ======================================================\n# ${st.displayName}  (token: ${k})\n# 由 SUZERAIN 剧情编辑器 v2 生成\n# ======================================================\n\n`;

  e+=`SZR_${k}_start = {\n\tSZR_chat_close = yes\n\tset_variable = { ROOT.SZR_current_chat_content = token:${k} }\n\tSZR_all_setup = yes\n\tSZR_chat_remove_first = yes\n\tadd_to_array = { ROOT.SZR_current_chat_messages = 1 }\n\tROOT = {\n\t\tset_country_flag = SZR_chat_gui_visible\n`;
  if(st.song)e+=`\t\tscoped_play_song = "${st.song}"\n`;
  e+=`\t}\n}\n\n`;

  e+=`SZR_chat_${k}_portraits_setup = {\n`;
  pNodes.forEach(n=>e+=`\tadd_to_array = { ROOT.SZR_portraits_local = ${n.msgNum} }\n`);
  e+=`}\n\n`;

  e+=`SZR_chat_${k}_END_setup = {\n`;
  eNodes.forEach(n=>e+=`\tadd_to_array = { ROOT.SZR_END_msgs = ${n.msgNum} }\n`);
  e+=`}\n\n`;

  e+=`SZR_chat_${k}_option_setup = {\n`;
  oNodes.forEach(n=>e+=`\tadd_to_array = { ROOT.SZR_chat_options_available = ${n.msgNum} }\n`);
  e+=`}\n\n`;

  e+=`SZR_chat_${k}_name_setup = {\n`;
  nNodes.forEach(n=>e+=`\tadd_to_array = { ROOT.SZR_chat_names = ${n.msgNum} }\n`);
  e+=`}\n\n`;

  e+=`SZR_chat_${k}_special_transfer_setup = {\n`;
  if(tNodes.length)tNodes.forEach(n=>e+=`\tadd_to_array = { ROOT.SZR_special_transfers = ${n.msgNum} }\n`);
  else e+=`\tadd_to_array = { ROOT.SZR_special_transfers = 99999 } # placeholder\n`;
  e+=`}\n\n`;

  // portraits_get
  e+=`SZR_chat_portraits_get_${k} = {\n`;
  pNodes.forEach(n=>{
    n.portraitOps.forEach(op=>{
      e+=`\tif = {\n\t\tlimit = { check_variable = { last_value = ${n.msgNum} } }\n`;
      if(op.type==='remove_first_add'){
        e+=`\t\tSZR_chat_portrait_remove_first = yes\n`;
        if(op.charId)e+=`\t\tadd_to_array = { ROOT.SZR_chat_speaking_bois = ${op.charId} }\n`;
      }else if(op.type==='add_first_empty'){
        e+=`\t\tSZR_chat_portrait_add_first = yes\n`;
      }else if(op.type==='move_last'){
        e+=`\t\tset_temp_variable = { temp_add_boi = ${op.charId||'???'} }\n`;
        e+=`\t\tSZR_chat_portrait_move_last = yes\n`;
      }else if(op.type==='clear'){
        e+=`\t\tclear_array = ROOT.SZR_portraits_local\n`;
      }
      if(n.portraitSong)e+=`\t\tscoped_play_song = "${n.portraitSong}"\n`;
      e+=`\t}\n`;
    });
  });
  e+=`}\n\n`;

  // names_get
  e+=`SZR_chat_names_get_${k} = {\n`;
  Object.entries(bySpeaker).forEach(([cid,msgs])=>{
    e+=`\tif = {\n\t\tlimit = {\n\t\t\tOR = {\n`;
    msgs.forEach(m=>e+=`\t\t\t\tcheck_variable = { last_value = ${m} }\n`);
    e+=`\t\t\t}\n\t\t}\n\t\tadd_to_array = { ROOT.SZR_current_chat_messages = ${cid} }\n\t\tSZR_chat_remove_first = yes\n\t}\n`;
  });
  e+=`}\n\n`;

  // special_transfer — if/else_if/else chain per transfer node
  e+=`SZR_chat_special_transfer_${k} = {\n`;
  tNodes.forEach(tn=>{
    const conds=tn.transferBranches.filter(b=>b.condType!=='none');
    const def=tn.transferBranches.find(b=>b.condType==='none');
    e+=`\t# --- node #${tn.msgNum} ---\n`;
    if(conds.length){
      conds.forEach((b,i)=>{
        const lim=limitBlock(b,'\t\t');
        e+=`\t${i===0?'if':'else_if'} = {\n`;
        if(lim)e+=`${lim}\n`;
        e+=`\t\tset_temp_variable = { last_value = ${b.toMsgNum||'???'} }\n\t}\n`;
      });
      if(def){e+=`\telse = {\n\t\tset_temp_variable = { last_value = ${def.toMsgNum||'???'} }\n\t}\n`;}
    } else if(def){
      // only default: simple if with node num check (matches pattern in kmd_c1)
      e+=`\tif = {\n\t\tlimit = { check_variable = { last_value = ${tn.msgNum} } }\n`;
      e+=`\t\tset_temp_variable = { last_value = ${def.toMsgNum||'???'} }\n\t}\n`;
    }
  });
  e+=`}\n\n`;

  // options_get
  e+=`SZR_chat_options_get_${k} = {\n`;
  oNodes.forEach(n=>{
    e+=`\tif = {\n\t\tlimit = { check_variable = { last_value = ${n.msgNum} } }\n`;
    n.options.forEach(o=>e+=`\t\tadd_to_array = { ROOT.SZR_chat_options = ${o.optNum} }\n`);
    e+=`\t}\n`;
  });
  e+=`}\n\n`;

  // options_EFFECT
  e+=`SZR_chat_options_EFFECT_${k} = {\n`;
  e+=`\tlog = "option check = [?SZR_current_chat_content.GetTokenKey]"\n\n`;
  oNodes.forEach(n=>{
    n.options.forEach(o=>{
      e+=`\tif = {\n\t\tlimit = { check_variable = { SZR_chat_option = ${o.optNum} } }\n`;
      if(!o.useContinue&&o.toMsgNum)
        e+=`\t\tset_temp_variable = { last_value = ${o.toMsgNum} }\n`;
      if(o.effectScript&&o.effectScript.trim()){
        e+=`\t\tROOT = {\n`;
        o.effectScript.split('\n').filter(l=>l.trim()).forEach(l=>e+=`\t\t\t${l.trim()}\n`);
        e+=`\t\t}\n`;
      }
      if(o.useContinue)
        e+=`\t\tSZR_chat_continue_effect = yes\n`;
      e+=`\t}\n`;
    });
  });
  // If any option uses continue_effect, we do NOT call generic at end for those
  const hasGeneric=oNodes.some(n=>n.options.some(o=>!o.useContinue));
  if(hasGeneric)e+=`\tSZR_chat_option_select_generic_effect = yes\n`;
  e+=`}\n`;

  document.getElementById('effCode').textContent=e;

  // LOC
  let l=`l_simp_chinese:\n\n # ${st.displayName}\n`;
  l+=` SZR_chat_screen_${k}_0_text: ""\n`;
  l+=` SZR_chat_screen_${k}_9998_text: ""\n\n`;
  nodes.forEach(n=>{
    let c='';
    if(n.portraitOps.length)c+=' #PORTRAIT';
    if(n.nameOnFirst&&n.speaker)c+=' #NAME';
    if(n.options.length)c+=' #OPTION';
    if(n.isEnd)c+=' #END';
    if(n.isTransfer)c+=' #TRANSFER';
    l+=` SZR_chat_screen_${k}_${n.msgNum}_text: "${n.text||''}"${c}\n`;
  });
  l+='\n';
  oNodes.forEach(n=>{
    n.options.forEach(o=>{
      l+=` SZR_chat_option_${k}_${o.optNum}_text: "${o.text||''}"${o.toMsgNum?' #TO '+o.toMsgNum:''}\n`;
    });
  });
  document.getElementById('locCode').textContent=l;
}

function copyExp(){
  const eff=document.getElementById('effDiv').style.display!=='none';
  const t=eff?document.getElementById('effCode').textContent:document.getElementById('locCode').textContent;
  navigator.clipboard.writeText(t).then(()=>alert('已复制'));
}
function dlExp(){
  const st=cs();
  const eff=document.getElementById('effDiv').style.display!=='none';
  const t=eff?document.getElementById('effCode').textContent:document.getElementById('locCode').textContent;
  const fn=eff?`SZR_${st.tokenKey}_effects.txt`:`SZR_${st.tokenKey}_l_simp_chinese.yml`;
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+t],{type:'text/plain;charset=utf-8'}));
  a.download=fn;a.click();
}

// PREVIEW
function showPreview(){
  const st=cs();if(!st){alert('请先选择剧情');return;}
  const nodes=[...st.nodes].sort((a,b)=>a.msgNum-b.msgNum);
  let h=`<div style="font-family:'Noto Serif SC',serif;font-size:13px;color:var(--gold-dim);margin-bottom:12px">${st.displayName}</div>`;
  nodes.forEach(n=>{
    const sp=n.speaker?cb(n.speaker):null;
    const sc=sp?sp.color:'var(--text-dim)';
    h+=`<div class="preview-msg">`;
    if(sp)h+=`<div class="preview-speaker" style="color:${sc}">${sp.name}</div>`;
    h+=`<div class="preview-content">${esc(n.text)||''}</div>`;
    if(n.options.length)n.options.forEach(o=>h+=`<div class="preview-opt">▶ [${o.optNum}] ${esc(o.text)||'...'}</div>`);
    if(n.isEnd)h+=`<div style="font-size:10px;color:var(--red-bright);margin-top:4px">═══ 剧情结束 ═══</div>`;
    if(n.isTransfer)h+=`<div style="font-size:10px;color:var(--purple-bright);margin-top:4px">⤳ 特殊跳转（${n.transferBranches.length}分支）</div>`;
    h+=`</div>`;
  });
  document.getElementById('prevContent').innerHTML=h;
  document.getElementById('previewModal').classList.add('open');
}

init();
</script>
</body>
</html>
